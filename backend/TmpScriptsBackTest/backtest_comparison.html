<style>

  body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

  h1 { color: #e0e0e0; text-align: center; font-size: 22px; margin-bottom: 6px; }

  .card { background: #16213e; border-radius: 10px; padding: 20px; text-align: center; }
  .card h3 { color: #888; font-size: 13px; font-weight: normal; margin-bottom: 8px; }
  .card .val { font-size: 32px; font-weight: bold; }
  .card .pct { font-size: 14px; margin-top: 4px; }

    textStyle: { color: '#e0e0e0', fontSize: 13 },
    formatter: function(params) {

        s += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'

    textStyle: { color: '#aaa', fontSize: 14 },

    type: 'category',

    axisLabel: { color: '#888', fontSize: 11, rotate: 45,
      formatter: function(v) { return v.slice(5); }

    axisTick: { show: false },
    splitLine: { show: false }
  },
  yAxis: {
    type: 'value',
    name: '净值 (起点=1000)',
    nameTextStyle: { color: '#888', fontSize: 12 },
    axisLine: { show: false },
    axisLabel: { color: '#888', fontSize: 12 },
    splitLine: { lineStyle: { color: '#222', type: 'dashed' } },
    min: 800
  },
  series: [
    {
      name: 'Top 3',
      type: 'line',
      data: top3,
      smooth: true,
      symbol: 'none',
      lineStyle: { width: 2 },
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: '#ff6b6b', type: 'dashed', width: 1 },
        data: [{ yAxis: 1000, label: { formatter: '起点 1000', color: '#ff6b6b', fontSize: 11 } }]
      }
    },
    {
      name: 'Top 5',
      type: 'line',
      data: top5,
      smooth: true,
      symbol: 'none',
      lineStyle: { width: 2 }
    },
    {
      name: 'Top 10',
      type: 'line',
      data: top10,
      smooth: true,
      symbol: 'none',
      lineStyle: { width: 2 }
    }
  ]

var ss = document.getElementById('stats');
var cards = [
  { title: 'Top 3', val: final3.toFixed(2), pct: ((final3-1000)/10).toFixed(1), color: '#ff6b6b' },
  { title: 'Top 5', val: final5.toFixed(2), pct: ((final5-1000)/10).toFixed(1), color: '#ffd93d' },
  { title: 'Top 10', val: final10.toFixed(2), pct: ((final10-1000)/10).toFixed(1), color: '#6bcb77' }
];
cards.forEach(function(c) {
  ss.innerHTML += '<div class="card">'
    + '<h3>' + c.title + '</h3>'
    + '<div class="val" style="color:' + c.color + '">' + c.val + '</div>'
    + '<div class="pct" style="color:' + c.color + '">' + (c.pct>=0?'+':'') + c.pct + '%</div>'
    + '</div>';
