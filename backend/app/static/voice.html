<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>__VOICE_TITLE__</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #000; color: #fff;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  h1 { font-size: 32px; margin: 8px 0 4px; font-weight: 700; }
  .updated { font-size: 18px; color: #999; margin-bottom: 20px; }
  .list { width: 100%; max-width: 680px; }
  .stock {
    display: flex; align-items: center; justify-content: space-between;
    background: #1a1a1a; border-radius: 16px;
    padding: 22px 24px; margin-bottom: 16px;
  }
  .stock .name { font-size: 34px; font-weight: 700; }
  .stock .right { text-align: right; }
  .stock .price { font-size: 40px; font-weight: 800; line-height: 1.1; }
  .stock .pct { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .up { color: #ff4d4f; }      /* A股红涨 */
  .down { color: #00d97e; }    /* A股绿跌 */
  .flat { color: #cccccc; }
  .empty { font-size: 26px; color: #999; text-align: center; margin-top: 40px; }
  .btn {
    width: 100%; max-width: 680px;
    margin-top: 28px; padding: 30px;
    font-size: 40px; font-weight: 800;
    color: #000; background: #ffd666; border: none; border-radius: 24px;
    box-shadow: 0 6px 0 #d4a017;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d4a017; }
  .hint { font-size: 18px; color: #888; margin-top: 18px; text-align: center; }
  audio { display: none; }
</style>
</head>
<body>
  <h1>__VOICE_TITLE__</h1>
  <div class="updated" id="updated">加载中…</div>
  <div class="list" id="list"></div>
  <button class="btn" id="playBtn">🔊 开始播报</button>
  <div class="hint" id="hint">点击下方按钮，自动逐只播报并每 30 秒循环刷新</div>
  <audio id="audio" preload="none"></audio>

<script>
  var TOKEN = "__VOICE_TOKEN__";
  var REFRESH = parseInt("__VOICE_REFRESH__", 10) || 30;
  var audioEl = document.getElementById("audio");
  var hintEl = document.getElementById("hint");
  var btnEl = document.getElementById("playBtn");

  var broadcasting = false;
  var queue = [];        // 本轮待播音频 URL 列表
  var queueIdx = 0;
  var roundStart = 0;
  var nextTimer = null;

  function fmtPct(pct) {
    if (pct === null || pct === undefined) return "--";
    var sign = pct > 0 ? "+" : "";
    return sign + pct.toFixed(2) + "%";
  }
  function cls(pct) {
    if (pct === null || pct === undefined) return "flat";
    if (pct > 0) return "up";
    if (pct < 0) return "down";
    return "flat";
  }

  function render(data) {
    document.getElementById("updated").textContent = "最后更新：" + (data.updated_at || "");
    var list = document.getElementById("list");
    if (!data.stocks || data.stocks.length === 0) {
      list.innerHTML = '<div class="empty">您还没有关注股票，请让家人帮您添加</div>';
      return;
    }
    var html = "";
    data.stocks.forEach(function (s) {
      var priceTxt = s.price === null || s.price === undefined ? "--" : s.price.toFixed(2);
      html += '<div class="stock">'
            +   '<div class="name">' + s.name + '</div>'
            +   '<div class="right">'
            +     '<div class="price ' + cls(s.pct) + '">' + priceTxt + '</div>'
            +     '<div class="pct ' + cls(s.pct) + '">' + fmtPct(s.pct) + '</div>'
            +   '</div>'
            + '</div>';
    });
    list.innerHTML = html;
  }

  async function fetchAnnounce() {
    try {
      var resp = await fetch("/api/v1/voice/announce?token=" + encodeURIComponent(TOKEN));
      var json = await resp.json();
      if (json.code === 0 && json.data) return json.data;
    } catch (e) {}
    return null;
  }

  // 顺序播放单条音频；播放结束或出错都继续下一条
  function playOne(url, onEnd) {
    var done = false;
    function finish() {
      if (done) return;
      done = true;
      audioEl.onended = null;
      audioEl.onerror = null;
      onEnd();
    }
    audioEl.onended = finish;
    audioEl.onerror = finish;
    audioEl.src = url;
    var p = audioEl.play();
    if (p && p.catch) p.catch(function () { finish(); });
  }

  function playQueue() {
    if (!broadcasting) return;
    if (queueIdx >= queue.length) {
      scheduleNext();
      return;
    }
    var url = queue[queueIdx];
    hintEl.textContent = "正在播报 第 " + (queueIdx + 1) + " / " + queue.length + " 只";
    queueIdx++;
    playOne(url, function () {
      if (!broadcasting) return;
      playQueue();
    });
  }

  // 本轮播完：若距开始不足 REFRESH 秒，则停顿补足后再重新获取
  function scheduleNext() {
    if (!broadcasting) return;
    var elapsed = (Date.now() - roundStart) / 1000;
    var wait = REFRESH - elapsed;
    if (wait < 0) wait = 0;
    if (wait > 0) {
      hintEl.textContent = "本轮播报完成，" + Math.ceil(wait) + " 秒后重新播报…";
      nextTimer = setTimeout(startRound, wait * 1000);
    } else {
      hintEl.textContent = "本轮播报完成，重新获取行情…";
      startRound();
    }
  }

  async function startRound() {
    if (!broadcasting) return;
    roundStart = Date.now();
    queueIdx = 0;
    hintEl.textContent = "正在获取最新行情…";
    var data = await fetchAnnounce();
    if (!data) {
      hintEl.textContent = "获取行情失败，" + REFRESH + " 秒后重试";
      nextTimer = setTimeout(startRound, REFRESH * 1000);
      return;
    }
    render(data);
    queue = (data.stocks || []).map(function (s) { return s.audio_url; }).filter(Boolean);
    if (queue.length === 0) {
      hintEl.textContent = "暂无可播报内容，" + REFRESH + " 秒后重试";
      nextTimer = setTimeout(startRound, REFRESH * 1000);
      return;
    }
    playQueue();
  }

  function startBroadcast() {
    if (broadcasting) return;
    broadcasting = true;
    btnEl.textContent = "⏸ 停止播报";
    startRound();
  }
  function stopBroadcast() {
    broadcasting = false;
    if (nextTimer) { clearTimeout(nextTimer); nextTimer = null; }
    audioEl.pause();
    audioEl.onended = null;
    audioEl.onerror = null;
    btnEl.textContent = "🔊 开始播报";
    hintEl.textContent = "已暂停，点击按钮继续播报";
  }

  btnEl.addEventListener("click", function () {
    if (broadcasting) stopBroadcast(); else startBroadcast();
  });

  // 首次加载仅展示行情（浏览器禁止无手势自动播放，需点按钮启动轮询播报）
  (async function () {
    var data = await fetchAnnounce();
    if (data) render(data);
  })();
</script>
</body>
</html>
